<html><head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<meta charset="UTF-8">

<title>
eBay Dropshipping Profit Simulator
</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Inter,system-ui;
background:#0b1220;
color:white;
margin:0;
}

/* TOPBAR */

.topbar{
height:90px;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #1f2937;
position:relative;
}

.logo{
height:36px;
}

.brandText{
display:flex;
flex-direction:column;
align-items:center;
}

.brandTitle{
font-size:16px;
font-weight:600;
}

.brandSub{
font-size:11px;
color:#94a3b8;
}

.brandAuthor{
font-size:10px;
color:#64748b;
}

/* THEME BUTTON */

.themeButton{
position:absolute;
right:30px;
top:30px;
background:#1f2937;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* LAYOUT */

.container{
max-width:1400px;
margin:auto;
padding:40px;
}

.dashboard{
display:grid;
grid-template-columns:320px 1fr 340px;
gap:25px;
}

/* CARDS */

.card{
background:#111827;
border-radius:14px;
padding:22px;
border:1px solid #1f2937;
}

label{
font-size:12px;
color:#94a3b8;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #1f2937;
background:#0b1220;
color:white;
}

.slider{
width:100%;
margin-bottom:20px;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#0f172a,#1e293b);
border-radius:16px;
padding:40px;
text-align:center;
border:1px solid #1f2937;
}

.heroTitle{
font-size:13px;
color:#94a3b8;
}

.heroValue{
font-size:50px;
font-weight:700;
margin-top:10px;
}

.heroPercent{
font-size:18px;
color:#94a3b8;
}

/* METER */

.meter{
height:10px;
background:#1f2937;
border-radius:8px;
margin-top:25px;
position:relative;
}

.meterFill{
height:100%;
background:linear-gradient(90deg,#ef4444,#facc15,#22c55e);
border-radius:8px;
width:0%;
}

.meterIndicator{
position:absolute;
top:-6px;
width:4px;
height:22px;
background:white;
}

/* METRICS */

.metrics{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.metric{
background:#111827;
padding:16px;
border-radius:10px;
border:1px solid #1f2937;
}

.metricTitle{
font-size:11px;
color:#94a3b8;
}

.metricValue{
font-size:18px;
margin-top:4px;
}

/* FOOTER */

.footer{
margin-top:40px;
text-align:center;
font-size:12px;
color:#64748b;
}
  .installButton{
position:absolute;
right:110px;
top:30px;
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

/* LIGHT MODE */

.light{
background:#f5f7fb;
color:#111827;
}

.light .topbar{
background:white;
border-bottom:1px solid #e5e7eb;
}

.light .card{
background:white;
border:1px solid #e5e7eb;
}

.light .hero{
background:white;
border:1px solid #e5e7eb;
}

.light .metric{
background:white;
border:1px solid #e5e7eb;
}

.light input{
background:white;
color:#111827;
border:1px solid #e5e7eb;
}

.light label,
.light .metricTitle,
.light .heroTitle,
.light .heroPercent{
color:#6b7280;
}

.light .themeButton{
background:#e5e7eb;
color:#111827;
}

</style>

</head>

<body>

<div class="topbar">

<img src="logo.png" class="logo">

<div class="brandText">

<div class="brandTitle">
eBay Dropshipping Profit Simulator
</div>

<div class="brandSub">
JG Building Your Future
</div>

<div class="brandAuthor">
Created by Javier Gayote
</div>

</div>

<button id="themeToggle" class="themeButton">🌙</button>
  <button id="installBtn" class="installButton" style="display:none">
Install App
</button>

</div>

<div class="container">

<div class="dashboard">

<div class="card">

<h3>Product Inputs</h3>

<label>Purchase Price</label>
<input id="purchasePrice" value="5">

<label>Sale Price</label>
<input id="salePrice" value="13.99">

<input type="range" min="1" max="100" step="0.1" id="priceSlider" class="slider">

<label>Sponsor %</label>
<input id="sponsorRate">

<input type="range" min="0" max="20" step="0.1" id="sponsorSlider" class="slider">

<label>Target Margin %</label>
<input id="targetProfitPercent">

</div>

<div>

<div class="hero">

<div class="heroTitle">Estimated Profit</div>

<div class="heroValue" id="profitHero">$0</div>

<div class="heroPercent" id="profitPercentHero">0%</div>

<div class="meter">

<div class="meterFill" id="meterFill"></div>

<div class="meterIndicator" id="meterIndicator"></div>

</div>

<div id="marginZone" style="margin-top:10px"></div>

</div>

<div class="metrics">

<div class="metric">
<div class="metricTitle">ROI</div>
<div class="metricValue" id="roi"></div>
</div>

<div class="metric">
<div class="metricTitle">ROAS</div>
<div class="metricValue" id="roas"></div>
</div>

<div class="metric">
<div class="metricTitle">Break Even</div>
<div class="metricValue" id="breakEven"></div>
</div>

<div class="metric">
<div class="metricTitle">Required Price</div>
<div class="metricValue" id="requiredPrice"></div>
</div>

</div>

</div>

<div class="card">

<h3>eBay Configuration</h3>

<label>Sales Tax %</label>
<input id="taxRate" value="6.5">

<label>FVF %</label>
<input id="fvfRate" value="12.7">

<label>International Fee %</label>
<input id="intlRate" value="1.55">

<label>Purchase Fee %</label>
<input id="purchaseFeeRate" value="10">

<label>Software Fee</label>
<input id="softwareFee" value="0.75">

<label>Order Fee</label>
<input id="orderFee" value="0.40">

<hr>

<div class="metric">
<div class="metricTitle">Buyer Pays</div>
<div class="metricValue" id="buyerPays"></div>
</div>

<div class="metric">
<div class="metricTitle">Total Fees</div>
<div class="metricValue" id="totalFees"></div>
</div>

<div class="metric">
<div class="metricTitle">Max Sponsor</div>
<div class="metricValue" id="sponsorLimit"></div>
</div>

<div class="metric">
<div class="metricTitle">Suggested Prices</div>
<div class="metricValue" id="priceSuggestions"></div>
</div>

</div>

</div>

<div class="footer">
eBay Dropshipping Profit Simulator • JG Building Your Future
</div>

</div>

<script>

/* THEME */

const themeToggle = document.getElementById("themeToggle")

themeToggle.onclick=function(){

document.body.classList.toggle("light")

if(document.body.classList.contains("light")){
themeToggle.innerHTML="☀️"
}else{
themeToggle.innerHTML="🌙"
}

}

/* SLIDERS */

priceSlider.oninput=function(){
salePrice.value=this.value
calculate()
}

sponsorSlider.oninput=function(){
sponsorRate.value=this.value
calculate()
}

/* MOTOR ORIGINAL */

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calculate)
})

function calculate(){

let purchasePrice=parseFloat(val("purchasePrice"))||0
let salePrice=parseFloat(val("salePrice"))||0
let sponsorRate=(parseFloat(val("sponsorRate"))||0)/100
let targetProfitPercent=parseFloat(val("targetProfitPercent"))||0

let taxRate=(parseFloat(val("taxRate"))||0)/100
let fvfRate=(parseFloat(val("fvfRate"))||0)/100
let intlRate=(parseFloat(val("intlRate"))||0)/100
let purchaseFeeRate=(parseFloat(val("purchaseFeeRate"))||0)/100
let softwareFee=parseFloat(val("softwareFee"))||0
let orderFee=parseFloat(val("orderFee"))||0

let purchaseFee=purchasePrice*purchaseFeeRate
let totalPurchase=purchasePrice+purchaseFee+softwareFee

let tax=salePrice*taxRate
let buyerPays=salePrice+tax

let feeBase=buyerPays

let fvf=feeBase*fvfRate
let intl=feeBase*intlRate
let sponsorCost=salePrice*sponsorRate

let totalFees=fvf+intl+sponsorCost+orderFee

let netPayout=salePrice-totalFees
let profit=netPayout-totalPurchase

let roi=(profit/totalPurchase)*100
let roas=sponsorCost>0?salePrice/sponsorCost:0
let profitPercent=salePrice>0?(profit/salePrice)*100:0

set("profitHero","$"+profit.toFixed(2))
set("profitPercentHero",profitPercent.toFixed(2)+"% margin")

set("buyerPays","$"+buyerPays.toFixed(2))
set("totalFees","$"+totalFees.toFixed(2))
set("roi",roi.toFixed(2)+"%")
set("roas",roas.toFixed(2))

let meterPercent=Math.min(Math.max(profitPercent,0),30)/30*100
meterFill.style.width=meterPercent+"%"
meterIndicator.style.left=meterPercent+"%"

let zone="Strong Margin"
if(profitPercent<5)zone="Loss"
else if(profitPercent<15)zone="Low Margin"

marginZone.innerHTML=zone

let breakEven=0

for(let p=1;p<500;p+=0.01){

let t=p*taxRate
let base=p+t

let f=base*fvfRate
let i=base*intlRate
let s=p*sponsorRate

let fees=f+i+s+orderFee

let payout=p-fees
let prof=payout-totalPurchase

if(prof>=0){breakEven=p;break}

}

set("breakEven","$"+breakEven.toFixed(2))

let requiredPrice=0

if(targetProfitPercent>0){

for(let p=1;p<500;p+=0.01){

let t=p*taxRate
let base=p+t

let f=base*fvfRate
let i=base*intlRate
let s=p*sponsorRate

let fees=f+i+s+orderFee

let payout=p-fees
let prof=payout-totalPurchase

let percent=(prof/p)*100

if(percent>=targetProfitPercent){
requiredPrice=p
break
}

}

set("requiredPrice","$"+requiredPrice.toFixed(2))

}else set("requiredPrice","—")

let tax2=salePrice*taxRate
let base2=salePrice+tax2

let f2=base2*fvfRate
let i2=base2*intlRate

let profitNoSponsor=(salePrice-(f2+i2+orderFee))-totalPurchase

let limit=profitNoSponsor>0?(profitNoSponsor/salePrice)*100:0

set("sponsorLimit",limit.toFixed(2)+"%")

let good=(breakEven*1.2).toFixed(2)
let strong=(breakEven*1.4).toFixed(2)

priceSuggestions.innerHTML=
"Break-even $"+breakEven.toFixed(2)+"<br>"+
"Good margin $"+good+"<br>"+
"Strong margin $"+strong

}

function val(id){return document.getElementById(id).value}
function set(id,text){document.getElementById(id).innerHTML=text}

calculate()

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
  let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt = e;

document.getElementById("installBtn").style.display = "inline-block";

});

document.getElementById("installBtn").onclick = async ()=>{

if(!deferredPrompt) return;

deferredPrompt.prompt();

const { outcome } = await deferredPrompt.userChoice;

deferredPrompt = null;

document.getElementById("installBtn").style.display="none";

};

</script>
  

</body></html>
